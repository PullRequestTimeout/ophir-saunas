<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<!-- Favicon -->
	<link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
	<link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
	<link rel="manifest" href="/assets/favicon/site.webmanifest" />

	<!-- Preload CSS and Fonts -->
	<link rel="preload" href="%sveltekit.assets%/global.css" as="style" onload="this.rel='stylesheet'">
	<link rel="preload" href="/assets/fonts/Abigail-Bold.woff2" as="font" type="font/woff2" crossorigin>
	<link rel="preload" href="/assets/fonts/Abigail-Bold.woff" as="font" type="font/woff" crossorigin>
	<link rel="stylesheet" href="global.css" />
	%sveltekit.head%
	<script>
		// Set a CSS variable for the viewport height to handle mobile browser UI changes
		document.documentElement.style.setProperty("--vh", `${window.innerHeight * 0.01}px`);
	</script>
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
	<link rel="stylesheet" href="%sveltekit.assets%/global-noncritical.css" />
</body>

</html>
